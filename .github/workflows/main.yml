name: Deploy Hola Mundo to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Crear archivo Hola Mundo
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hola Mundo</title>
          </head>
          <body>
            <h1>Hola mundo desde GitHub Actions</h1>
            <p>Despliegue realizado correctamente.</p>
          </body>
          </html>
          EOF

      - name: Configurar clave privada SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Preparar carpeta SSH
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

      - name: Verificar puerto SSH del servidor
        env:
          SERVER_IP: ${{ secrets.IP }}
        run: |
          echo "Verificando conexión con $SERVER_IP por el puerto 22..."

          if timeout 15 bash -c "cat < /dev/null > /dev/tcp/$SERVER_IP/22"; then
            echo "El puerto 22 está disponible."
          else
            echo "::error::No fue posible conectarse a $SERVER_IP por el puerto 22."
            echo "Revisa el firewall, el servicio SSH o si el servidor usa otro puerto."
            exit 1
          fi

      - name: Agregar servidor a known_hosts
        env:
          SERVER_IP: ${{ secrets.IP }}
        run: |
          set -euo pipefail

          ssh-keyscan -T 15 -p 22 -H "$SERVER_IP" \
            > "$HOME/.ssh/known_hosts"

          if [ ! -s "$HOME/.ssh/known_hosts" ]; then
            echo "::error::No se pudo obtener la identificación SSH del servidor."
            exit 1
          fi

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Probar autenticación SSH
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh \
            -p 22 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_IP" \
            "echo 'Conexión SSH exitosa'; whoami; pwd"

      - name: Copiar index.html al servidor
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          scp \
            -P 22 \
            index.html \
            "$SERVER_USER@$SERVER_IP:/home/$SERVER_USER/index.html"

      - name: Verificar archivo desplegado
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh \
            -p 22 \
            "$SERVER_USER@$SERVER_IP" \
            "ls -la /home/$SERVER_USER/index.html && cat /home/$SERVER_USER/index.html"