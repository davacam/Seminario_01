name: Deploy Hola Mundo to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Crear archivo Hola Mundo
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hola Mundo</title>
          </head>
          <body>
            <h1>Hola mundo desde GitHub Actions</h1>
            <p>El despliegue al servidor fue exitoso.</p>
          </body>
          </html>
          EOF

      - name: Configurar conexión SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Registrar servidor SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.IP }}" >> ~/.ssh/known_hosts

      - name: Crear directorio en el servidor
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.IP }}" \
          "mkdir -p /home/${{ secrets.USER }}/hola-mundo"

      - name: Copiar archivo al servidor
        run: |
          scp index.html \
          "${{ secrets.USER }}@${{ secrets.IP }}:/home/${{ secrets.USER }}/hola-mundo/index.html"

      - name: Verificar despliegue
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.IP }}" \
          "ls -la /home/${{ secrets.USER }}/hola-mundo && cat /home/${{ secrets.USER }}/hola-mundo/index.html"