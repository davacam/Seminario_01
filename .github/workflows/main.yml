name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    
    steps:
      # 1. Clona el código del repositorio
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Configura la clave SSH para conectar al VPS
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH }}

      # 3. Agrega el servidor a known_hosts
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.IP }} >> ~/.ssh/known_hosts

      # 4. Copia los archivos al VPS
      - name: Push files to VPS
        run: |
          scp -r ./* ${{ secrets.USER }}@${{ secrets.IP }}:/home/taskmdaw/pokemon/
