name: Deploy React Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      # 1. Descargar el repositorio
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          cd frontend
          npm ci

      # 4. Generar build React
      - name: Generar build
        run: |
          cd frontend
          npm run build

      # 5. Verificar que el build fue generado
      - name: Verificar build
        run: |
          echo "Contenido de dist:"
          ls -lah frontend/dist

      # 6. Configurar clave SSH
      - name: Configurar clave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      # 7. Configurar known_hosts
      - name: Configurar known_hosts
        env:
          SERVER_IP: ${{ secrets.IP }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -T 15 -H "$SERVER_IP" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      # 8. Verificar conexión SSH
      - name: Verificar conexión SSH
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_IP" \
            "echo 'Conexión SSH exitosa para:' && whoami"

      # 9. Crear directorio de despliegue
      - name: Crear directorio de despliegue
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh "$SERVER_USER@$SERVER_IP" \
            "mkdir -p /var/www/seminario1/tasksmdaw"

      # 10. Limpiar despliegue anterior
      - name: Limpiar despliegue anterior
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh "$SERVER_USER@$SERVER_IP" \
            "find /var/www/seminario1/tasksmdaw -mindepth 1 -delete"

      # 11. Copiar build React al servidor
      - name: Copiar build al servidor
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          scp -r frontend/dist/* \
            "$SERVER_USER@$SERVER_IP:/var/www/seminario1/tasksmdaw/"

      # 12. Verificar contenido desplegado
      - name: Verificar despliegue
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh "$SERVER_USER@$SERVER_IP" \
            "echo 'Contenido desplegado:' && ls -lah /var/www/seminario1/tasksmdaw"
