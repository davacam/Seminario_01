name: Deploy Hola Mundo to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Crear archivo Hola Mundo
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hola Mundo</title>
          </head>
          <body>
            <h1>Hola mundo desde GitHub Actions</h1>
            <p>El despliegue fue realizado correctamente.</p>
          </body>
          </html>
          EOF

      - name: Configurar clave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Configurar known_hosts
        env:
          SERVER_IP: ${{ secrets.IP }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -T 15 -H "$SERVER_IP" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Verificar conexión SSH
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_IP" \
            "echo 'Conexión SSH exitosa para el usuario:' && whoami"

      - name: Crear directorio de despliegue
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh "$SERVER_USER@$SERVER_IP" \
            "mkdir -p /var/www/seminario1/tasksmdaw"

      - name: Copiar archivo al servidor
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          scp index.html \
            "$SERVER_USER@$SERVER_IP:/var/www/seminario1/tasksmdaw/index.html"

      - name: Verificar despliegue
        env:
          SERVER_IP: ${{ secrets.IP }}
          SERVER_USER: ${{ secrets.USER }}
        run: |
          ssh "$SERVER_USER@$SERVER_IP" \
            "ls -la /var/www/seminario1/tasksmdaw/index.html && \
             cat /var/www/seminario1/tasksmdaw/index.html"
